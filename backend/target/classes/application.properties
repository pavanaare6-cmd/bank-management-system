# ============================================
# Bank Management System - Configuration File
# ============================================

# --- Server Configuration ---
server.port=8080

# --- MySQL Database Configuration ---
# Change username and password to match your MySQL setup
spring.datasource.url=jdbc:mysql://localhost:3306/bank_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=pavan
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate Configuration ---
# update = creates/updates tables automatically based on entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- JWT Configuration ---
# Secret key for signing JWT tokens (change this to a strong random string in production)
app.jwt.secret=BankManagementSystemSecretKey2024VeryLongSecretKeyForJWTSigning
# Token expiration time in milliseconds (86400000 = 24 hours)
app.jwt.expiration=86400000

# --- CORS Configuration ---
app.cors.allowed-origins=*

# --- Logging ---
logging.level.com.bank=DEBUG

# --- Static Resources ---
# Serve frontend files from the frontend directory
spring.web.resources.static-locations=file:../frontend/
