services:
  - type: web
    name: bank-management-system
    env: java
    region: oregon
    plan: free
    buildCommand: bash render-build.sh
    startCommand: bash start.sh
    envVars:
      - key: JAVA_VERSION
        value: "17"
      - key: PORT
        value: "8080"
      - key: SPRING_PROFILES_ACTIVE
        value: "production"
